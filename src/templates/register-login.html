<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register or Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
        .forms {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }
        .form-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            background-color: #fafafa;
        }
        .form-card h2 {
            margin-top: 0;
        }
        .form-field {
            display: block;
            width: 100%;
            margin-bottom: 16px;
        }
        .form-field label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
        }
        .form-field input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        .form-card button {
            padding: 10px 16px;
            background-color: #2d72d9;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .form-card button:hover {
            background-color: #235bb5;
        }
        @media (max-width: 760px) {
            .forms {
                grid-template-columns: 1fr;
            }
        }
        .error {
            color: red;
            size: 1.2rem;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Register or Login</h1>
    <div class="forms">
        <div class="form-card">
            <h2>Register</h2>
            <form method="POST" action="/register-login?register=1">
                <div class="form-field">
                    <label for="register-full_name">Full Name</label>
                    <input type="text" id="register-name" name="full_name" placeholder="Your full name" required>
                </div>
                <div class="form-field">
                    <label for="register-email">Email</label>
                    <input type="email" id="register-email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-field">
                    <label for="register-password">Password</label>
                    <input type="password" id="register-password" name="password" placeholder="Create a password" required>
                </div>
                <button type="submit">Register</button>
                {% if registerError %}
                    <p class="error">A user already exists with this email.</p>
                {% endif %}
            </form>
        </div>

        <div class="form-card">
            <h2>Login</h2>
            <form method="POST" action="/register-login?login=1">
                <div class="form-field">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" name="email" placeholder="you@example.com" required>
                </div>
                <div class="form-field">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" name="password" placeholder="Your password" required>
                </div>
                <button type="submit">Login</button>
                {% if loginError %}
                    <p class="error">Email and/or password incorrect.</p>
                {% endif %}
            </form>
        </div>
    </div>
</div>

</body>
</html>
