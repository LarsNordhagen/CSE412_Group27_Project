<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keyword Search Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-top: 50px;
        }
        .search-box {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        .results {
            margin-top: 20px;
        }
        .result-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
        .result-item:last-child {
            border-bottom: none;
        }
        button {
            margin-bottom: 15px;
            padding: 7px;
            font-size: 1.3rem;
            border: 2px solid black;
            cursor: pointer;
        }
    </style>
</head>
<body>

<h1>Crowdflow</h1>
<h2>Hello, {{ email }}</h2>

<div class="container">
    <button onclick="location.href='/events';">Create Event &rarr;</button>
    <br>
    <button onclick="location.href='/venues';">Manage Venues &rarr;</button>
    <br>
    <button onclick="location.href='/booking-create';">Create Booking &rarr;</button>
    <br>
    <button onclick="location.href='/my-bookings';">My Bookings &rarr;</button>
    <br>
    <br>
    <br>
    <button onclick="location.href='/logout';">Logout</button>
</div>

</body>
</html>
